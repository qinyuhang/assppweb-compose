services:
  asspp:
    image: ghcr.io/lakr233/assppweb:latest
    ports:
      - "8080:8080"
    volumes:
      - ./mnt/asspp-data:/data
    environment:
      - DATA_DIR=/data
      - PORT=8080
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "128m"
        max-file: "5"
    networks:
      - asspp-network

  # Xray 代理服务 (可选)
  # 取消注释以下配置并创建 xray-config 目录和 config.json
  xray:
    image: ghcr.io/xtls/xray-core:latest
    volumes:
      - ./xray-config:/etc/xray:ro
    environment:
      - XRAY_LOCATION_CONFIG=/etc/xray
    restart: unless-stopped
    # 暴露端口给 Caddy 内部使用
    expose:
      - "10000"  # WebSocket
      - "10001"  # gRPC
      - "10002"  # XHTTP
      - "10000/udp"  # WebSocket
      - "10001/udp"  # gRPC
      - "10002/udp"  # XHTTP
    networks:
      - asspp-network
  sub-store:
    image: xream/sub-store:http-meta
    container_name: sub-store
    restart: always
    networks:
      - asspp-network
    environment:
      SUB_STORE_BACKEND_API_HOST: 127.0.0.1
      SUB_STORE_BACKEND_API_PORT: 30001
      SUB_STORE_BACKEND_MERGE: true
      SUB_STORE_FRONTEND_BACKEND_PATH: /${SUB_STORE_API_PATH}
      # HTTP-META 的, 一般不用改
      PORT: 9876
      HOST: 127.0.0.1
    volumes:
      - ./sub-store-data:/opt/app/data
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "80:80/udp"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - ACME_AGREE=true
      - CF_API_TOKEN=${CF_API_TOKEN}
      - APP_DOMAIN=${APP_DOMAIN}
    networks:
      - asspp-network

  # TODO subconvert

  # TrustTunnel VPN 服务
  trusttunnel:
    build:
      context: .
      dockerfile: Dockerfile.trusttunnel
    container_name: trusttunnel-server
    restart: unless-stopped
    ports:
      - "8443:443/tcp"
      - "8443:443/udp"
    volumes:
      - ./trusttunnel-config/vpn.toml:/opt/vpn.toml:ro
      - ./trusttunnel-config/hosts.toml:/opt/hosts.toml:ro
      - ./trusttunnel-config/credentials.toml:/opt/credentials.toml:ro
      - ./trusttunnel-config/rules.toml:/opt/rules.toml:ro
      # 挂载 Caddy 的证书数据目录，只读
      - caddy-data:/caddy-data:ro
    environment:
      - TRUSTTUNNEL_DOMAIN=${TRUSTTUNEL_DOMAIN}
    networks:
      - asspp-network
    depends_on:
      - caddy
    logging:
      driver: "json-file"
      options:
        max-size: "128m"
        max-file: "5"

  # WireGuard VPN 中心服务端
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard-server
    restart: unless-stopped
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
    volumes:
      - ./wireguard:/config
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    environment:
      - TZ=Asia/Shanghai
    networks:
      - asspp-network

  # WireGuard 内网 DNS（AdGuard Home）
  wireguard-dns:
    image: adguard/adguardhome:latest
    container_name: wireguard-dns
    restart: unless-stopped
    ports:
      - "3000:3000" # 初次安装向导
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./wireguard-dns/work:/opt/adguardhome/work
      - ./wireguard-dns/conf:/opt/adguardhome/conf
    networks:
      - asspp-network

  # snell5
  snell5:
    image: funnyzak/snell-server
    container_name: snell-server
    environment:
      - IPV6=false
      - PORT=${SNELL_PORT}
      - PSK=${SNELL_PSK}
    restart: unless-stopped
    ports:
      - ${SNELL_PORT}:${SNELL_PORT}
      - ${SNELL_PORT}:${SNELL_PORT}/udp
volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  asspp-network:
    driver: bridge
