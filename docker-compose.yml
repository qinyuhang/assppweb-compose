services:
  asspp:
    image: ghcr.io/lakr233/assppweb:latest
    ports:
      - "8080:8080"
    volumes:
      - ./mnt/asspp-data:/data
    environment:
      - DATA_DIR=/data
      - PORT=8080
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "128m"
        max-file: "5"
    networks:
      - asspp-network

  # Xray 代理服务 (可选)
  # 取消注释以下配置并创建 xray-config 目录和 config.json
  xray:
    image: ghcr.io/xtls/xray-core:latest
    volumes:
      - ./xray-config:/etc/xray:ro
    environment:
      - XRAY_LOCATION_CONFIG=/etc/xray
    restart: unless-stopped
    # 暴露端口给 Caddy 内部使用
    expose:
      - "10000"  # WebSocket
      - "10001"  # gRPC
      - "10002"  # XHTTP
      - "10000/udp"  # WebSocket
      - "10001/udp"  # gRPC
      - "10002/udp"  # XHTTP
    networks:
      - asspp-network
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "80:80/udp"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - ACME_AGREE=true
      - CF_API_TOKEN=${CF_API_TOKEN}
      - APP_DOMAIN=${APP_DOMAIN}
    networks:
      - asspp-network

  # subconvert
  subconverter:
    image: tindy2013/subconverter:latest
    container_name: subconverter
    restart: unless-stopped
    ports:
      - "25500:25500"
    volumes:
      - ./subconverter/base:/base
    networks:
      - asspp-network
  # snell5
  snell5:
    image: funnyzak/snell-server
    container_name: snell-server
    environment:
      - IPV6=false
      - PORT=${SNELL_PORT}
      - PSK=${SNELL_PSK}
    restart: unless-stopped
    ports:
      - ${SNELL_PORT}:${SNELL_PORT}
      - ${SNELL_PORT}:${SNELL_PORT}/udp
volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  asspp-network:
    driver: bridge
